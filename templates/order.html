<div class="container mt-5">
  <h2>My Orders</h2>

  {% if orders %}
    {% for order in orders %}
      <div class="card mb-3">
        <div class="card-body">
          <p>Total: ₹{{ order.total }}</p>
          <p>Delivered to: {{ order.address }}</p>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p>No orders yet.</p>
  {% endif %}
</div>
