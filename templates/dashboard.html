{% extends 'base.html' %}

{% block title %}Dashboard - ShopSmart{% endblock %}

{% block content %}
<div class="container">
    <div class="hero-search mb-4">
        <h1>Welcome back 👋</h1>
        <p class="mb-0 opacity-90">Discover products tailored for you</p>
        <form action="{{ url_for('recommendations') }}" method="post" class="search-form d-flex mt-3">
            <input type="text" name="prod" class="form-control search-input" placeholder="Search for beauty, care, wellness…" required aria-label="Search products">
            <button type="submit" class="btn btn-dark search-btn">
                <i class="fas fa-search"></i> Search
            </button>
        </form>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <a href="{{ url_for('main') }}" class="text-decoration-none">
                <div class="card product-card h-100 border-0 shadow-sm">
                    <div class="card-body text-center py-5">
                        <i class="fas fa-compass fa-3x text-primary mb-3"></i>
                        <h5>Explore Products</h5>
                        <p class="text-muted small mb-0">Browse AI recommendations</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="{{ url_for('cart') }}" class="text-decoration-none">
                <div class="card product-card h-100 border-0 shadow-sm">
                    <div class="card-body text-center py-5">
                        <i class="fas fa-shopping-cart fa-3x text-primary mb-3"></i>
                        <h5>My Cart</h5>
                        <p class="text-muted small mb-0">View your cart</p>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="{{ url_for('profile') }}" class="text-decoration-none">
                <div class="card product-card h-100 border-0 shadow-sm">
                    <div class="card-body text-center py-5">
                        <i class="fas fa-user fa-3x text-primary mb-3"></i>
                        <h5>My Account</h5>
                        <p class="text-muted small mb-0">Manage profile</p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
